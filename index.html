<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BIOLAB AI Asistent</title>
<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:40px;
}
#chat{
border:1px solid #ddd;
padding:20px;
height:400px;
overflow:auto;
margin-bottom:20px;
}
input{
width:80%;
padding:10px;
}
button{
padding:10px;
}
</style>
</head>
<body>

<h1>BIOLAB AI Asistent</h1>

<div id="chat"></div>

<input id="msg" placeholder="Upišite pitanje...">
<button onclick="send()">Pošalji</button>

<script>
async function send() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const text = input.value;
  if (!text) return;

  chat.innerHTML += "<p><b>Vi:</b> " + text + "</p>";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text
    })
  });

  const data = await res.json();

  chat.innerHTML +=
    "<p><b>BIOLAB:</b> " + (data.reply || data.error) + "</p>";

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
